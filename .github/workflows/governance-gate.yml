name: Governance Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Required Governance Files
        shell: pwsh
        run: |
          $required = @(
            "README.md",
            "SCOPE.md",
            "GOVERNANCE.md",
            "STATUS.md",
            "proof/records/lifetime-case-ledger-v1-proof-bundle.json",
            "proof/records/lifetime-case-ledger-v1-public-summary.json",
            "evidence/EVIDENCE_LEDGER_SCHEMA.json",
            "evidence/evidence-ledger.json"
          )
          $missing = @()
          foreach ($f in $required) {
            if (-not (Test-Path -LiteralPath $f -PathType Leaf)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("Missing required files: " + ($missing -join ", "))
            exit 1
          }

  lifetime-ledger-public-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out platform manifest source
        uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-platform
          ref: e0580fc8d0b141cbdd71c1b95e3d7885a1d708e0
          path: hawkinsoperations-platform
      - name: Verify Lifetime Case Ledger proof summary
        run: |
          python scripts/verify-lifetime-ledger-public-summary.py --platform-manifest hawkinsoperations-platform/contracts/lifetime-case-ledger-v1-state-manifest.json --format json >/dev/null

  lifetime-ledger-proof-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out platform manifest source
        uses: actions/checkout@v4
        with:
          repository: HawkinsOperations/hawkinsoperations-platform
          ref: e0580fc8d0b141cbdd71c1b95e3d7885a1d708e0
          path: hawkinsoperations-platform
      - name: Verify Lifetime Case Ledger proof bundle
        run: |
          python scripts/verify-lifetime-ledger-proof-bundle.py --platform-manifest hawkinsoperations-platform/contracts/lifetime-case-ledger-v1-state-manifest.json --format json >/dev/null
