schema_version: phase2d-proof-status-index-v1
owner_repo: hawkinsoperations-proof
truth_surface: proof_boundary_index
human_review_required: true
purpose: Carry detection IDs through proof-boundary truth without promoting runtime, signal, public-safe, or website proof status.
claim_boundary:
  allowed_status_values:
    - SOURCE_EXISTS
    - SOURCE_CONTRACT_ENFORCED
    - VALIDATION_PLANNED
    - CONTROLLED_TEST_VALIDATED
    - PRIVATE_RUNTIME_EVIDENCE_CAPTURED
    - NOT_PUBLIC_SAFE
    - runtime_status=NOT_PROVEN
    - signal_status=NOT_PROVEN
    - human_review_required=true
  blocked_claims:
    - runtime-active public proof
    - signal-observed public proof
    - public-safe proof unless an explicit proof record supports it
    - live IdP proof
    - live SIEM proof
    - live Splunk proof
    - live Wazuh proof
    - live Cribl proof
    - live Security Onion proof
    - production-ready
    - fleet-wide
    - autonomous SOC
    - AI-approved disposition
    - analyst-approved disposition
    - website rendering as proof
entries:
  - detection_id: HO-DET-001
    source_truth_owner: hawkinsoperations-detections
    source_status: SOURCE_EXISTS
    validation_truth_owner: hawkinsoperations-validation
    validation_status: CONTROLLED_TEST_VALIDATED
    platform_visibility_owner: hawkinsoperations-platform
    platform_visibility_status: STATUS_VISIBILITY_PRESENT_NON_PROMOTIONAL
    proof_record_path: proof/records/HO-DET-001.md
    proof_card_path: proof/cards/HO-DET-001.md
    proof_ceiling: CONTROLLED_TEST_VALIDATED
    runtime_status: PRIVATE_RUNTIME_BOUNDARY_CONTEXT_ONLY
    signal_status: NOT_PROVEN
    public_safe_status: NOT_PUBLIC_SAFE
    website_status: WEBSITE_UNTOUCHED_NOT_PROOF
    blocked_claims:
      - runtime-active public proof
      - signal-observed public proof
      - public-safe proof
      - production-ready
      - live Splunk proof
      - live Wazuh proof
      - live Cribl proof
      - AI-approved disposition
      - analyst-approved disposition
    next_gate: proof-record-specific human review before any public-safe, runtime, or signal promotion
    notes: Existing proof record supports CONTROLLED_TEST_VALIDATED. Private runtime wording is boundary context only and does not create public runtime proof.

